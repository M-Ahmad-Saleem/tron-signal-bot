name: TRON Signal Bot

on:
  # Har 30 minute baad automatically run karo
  schedule:
    - cron: "*/30 * * * *"

  # Manually bhi run kar sako GitHub se
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      # State file restore karo (cooldown track karne ke liye)
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: tron-bot-state-${{ github.run_id }}
          restore-keys: |
            tron-bot-state-

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run TRON bot
        env:
          GMAIL_SENDER:   ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
        run: python tron_bot.py

      # State file save karo next run ke liye
      - name: Save state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: tron-bot-state-${{ github.run_id }}
